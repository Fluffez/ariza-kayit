<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Döşemealtı Belediyesi - Bilgi İşlem Arıza Kayıt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <div class="login-header">
                <h1>Döşemealtı Belediyesi</h1>
                <h2>Bilgi İşlem Arıza Kayıt Sistemi</h2>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Şifre" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="remember-me">
                        <span>Beni Hatırla</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>
        </div>
    </div>
    <!-- Main App -->
    <div id="main-app" class="main-app" style="display: none;">
        <div class="container">
            <header>
                <div class="header-content">
                    <div>
                        <h1>Döşemealtı Belediyesi</h1>
                        <h2>Bilgi İşlem Arıza Kayıt Sistemi</h2>
                    </div>
                    <button id="logout-btn" class="btn-logout">Çıkış</button>
                </div>
            </header>

        <div class="filter-section">
            <div class="filter-group">
                <select id="durum-filtre">
                    <option value="tumu">Tümü</option>
                    <option value="beklemede">Beklemede</option>
                    <option value="devam-ediyor">Devam Ediyor</option>
                    <option value="tamamlandi">Tamamlandı</option>
                </select>
            </div>
        </div>

        <div id="ariza-listesi" class="ariza-listesi">
            <div class="loading">Yükleniyor...</div>
        </div>
    </div>
    </div>
    </div>

    <!-- Floating Action Button -->
    <button id="fab-btn" class="fab-button">+</button>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Arıza Kaydı</h3>
                <button id="close-btn" class="close-btn">&times;</button>
            </div>
            <form id="ariza-form">
                <div class="form-group">
                    <label for="birim">Müdürlük</label>
                    <select id="birim" required>
                        <option value="">Seçiniz...</option>
                        <option value="NAR MASA">NAR MASA</option>
                        <option value="Ruhsat ve Denetim Müdürlüğü">Ruhsat ve Denetim Müdürlüğü</option>
                        <option value="Evrak Kayıt">Evrak Kayıt</option>
                        <option value="Zabıta Müdürlüğü">Zabıta Müdürlüğü</option>
                        <option value="Gelirler Müdürlüğü">Gelirler Müdürlüğü</option>
                        <option value="Sağlık İşleri Müdürlüğü">Sağlık İşleri Müdürlüğü</option>
                        <option value="İmar ve Şehircilik Müdürlüğü">İmar ve Şehircilik Müdürlüğü</option>
                        <option value="Plan ve Proje Müdürlüğü">Plan ve Proje Müdürlüğü</option>
                        <option value="Bilgi İşlem Müdürlüğü">Bilgi İşlem Müdürlüğü</option>
                        <option value="Fen İşleri Müdürlüğü">Fen İşleri Müdürlüğü</option>
                        <option value="Mali Hizmetler Müdürlüğü">Mali Hizmetler Müdürlüğü</option>
                        <option value="Yazı İşleri Müdürlüğü">Yazı İşleri Müdürlüğü</option>
                        <option value="Basın Yayın ve Halkla İlişkiler Müdürlüğü">Basın Yayın ve Halkla İlişkiler Müdürlüğü</option>
                        <option value="Destek Hizmetler Müdürlüğü">Destek Hizmetler Müdürlüğü</option>
                        <option value="İnsan Kaynakları ve Eğitim Müdürlüğü">İnsan Kaynakları ve Eğitim Müdürlüğü</option>
                        <option value="Emlak ve İstimlak Müdürlüğü">Emlak ve İstimlak Müdürlüğü</option>
                        <option value="Muhtarlık İşleri Müdürlüğü">Muhtarlık İşleri Müdürlüğü</option>
                        <option value="İklim Değişikliği ve Sıfır Atık">İklim Değişikliği ve Sıfır Atık</option>
                        <option value="Afet İşleri Müdürlüğü">Afet İşleri Müdürlüğü</option>
                        <option value="Hukuk İşleri Müdürlüğü">Hukuk İşleri Müdürlüğü</option>
                        <option value="Özel Kalem Müdürlüğü">Özel Kalem Müdürlüğü</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cihaz-turu">Cihaz Türü</label>
                    <select id="cihaz-turu" required>
                        <option value="">Seçiniz...</option>
                        <option value="Bilgisayar">Bilgisayar</option>
                        <option value="Yazıcı">Yazıcı</option>
                        <option value="Tarayıcı">Tarayıcı</option>
                        <option value="Ağ Cihazı">Ağ Cihazı</option>
                        <option value="Telefon">Telefon</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ariza-turu">Arıza Türü</label>
                    <select id="ariza-turu" required>
                        <option value="">Seçiniz...</option>
                        <option value="Donanım">Donanım</option>
                        <option value="Yazılım">Yazılım</option>
                        <option value="Ağ">Ağ</option>
                        <option value="Kullanıcı Hatası">Kullanıcı Hatası</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="aciklama">Arıza Açıklaması</label>
                    <textarea id="aciklama" rows="4" required placeholder="Arıza detaylarını giriniz..."></textarea>
                </div>

                <div class="form-group">
                    <label for="talep-eden">Talep Eden</label>
                    <input type="text" id="talep-eden" required placeholder="Ad Soyad">
                </div>

                <button type="submit" class="btn-primary">Kaydet</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
