<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Döşemealtı Belediyesi - Bilgi İşlem Arıza Kayıt</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-box">
            <div class="login-header">
                <h1>Döşemealtı Belediyesi</h1>
                <h2>Bilgi İşlem Arıza Kayıt Sistemi</h2>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Kullanıcı Adı" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Şifre" required>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="remember-me">
                        <span>Beni Hatırla</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="main-app" style="display: none;">
        <div class="container">
            <header>
                <div class="header-content">
                        <h1>Döşemealtı Belediyesi</h1>
                        <h2>Bilgi İşlem Yapılanlar Kayıt Sistemi</h2>
                    </div>
                    <button id="logout-btn" class="btn-logout">Çıkış</button>
                </div>
            </header>

            <div class="filter-section">
                <div class="filter-group">
                    <select id="durum-filtre">
                        <option value="tumu">Tümü</option>
                        <option value="beklemede">Beklemede</option>
                        <option value="devam-ediyor">Devam Ediyor</option>
                        <option value="tamamlandi">Tamamlandı</option>
                    </select>
                </div>
            </div>

            <div id="ariza-listesi" class="ariza-listesi">
                <div class="loading">Yükleniyor...</div>
            </div>
    <!-- Floating Action Button -->
    <button id="fab-btn" class="fab-button" style="display: none;">+</button>

    <!-- Floating Action Button -->
    <button id="fab-btn" class="fab-button">+</button>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="confirm-modal">
        <div class="confirm-box">
            <h3>Emin misiniz?</h3>
            <p id="confirm-message">Bu arıza kaydını silmek istediğinizden emin misiniz?</p>
            <div class="confirm-buttons">
                <button id="confirm-yes" class="btn-confirm btn-confirm-yes">Evet, Sil</button>
                <button id="confirm-no" class="btn-confirm btn-confirm-no">İptal</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Yeni Arıza Kaydı</h3>
                <button id="close-btn" class="close-btn">&times;</button>
            </div>
            <form id="ariza-form" novalidate>
                <div class="form-group">
                    <label for="birim">Müdürlük *</label>
                    <input type="text" id="birim" required placeholder="Müdürlük adı yazın..." autocomplete="off">
                    <div id="birim-suggestions" class="suggestions"></div>
                    <small class="error-message" id="birim-error"></small>
                </div>

                <div class="form-group">
                    <label for="cihaz-turu">Cihaz Türü *</label>
                    <select id="cihaz-turu" required>
                        <option value="">Seçiniz...</option>
                        <option value="Bilgisayar">Bilgisayar</option>
                        <option value="Yazıcı">Yazıcı</option>
                        <option value="Tarayıcı">Tarayıcı</option>
                        <option value="Ağ Cihazı">Ağ Cihazı</option>
                        <option value="Telefon">Telefon</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                    <small class="error-message" id="cihaz-error"></small>
                </div>

                <div class="form-group">
                    <label for="ariza-turu">Arıza Türü *</label>
                    <select id="ariza-turu" required>
                        <option value="">Seçiniz...</option>
                        <option value="Donanım">Donanım</option>
                        <option value="Yazılım">Yazılım</option>
                        <option value="Ağ">Ağ</option>
                        <option value="Kullanıcı Hatası">Kullanıcı Hatası</option>
                    </select>
                    <small class="error-message" id="ariza-turu-error"></small>
                </div>

                <div class="form-group">
                    <label for="talep-eden">Talep Eden *</label>
                    <input type="text" id="talep-eden" required placeholder="Ad Soyad veya dahili numara" autocomplete="off">
                    <div id="talep-suggestions" class="suggestions"></div>
                    <small class="error-message" id="talep-error"></small>
                </div>

                <div class="form-group">
                    <label for="aciklama">Arıza Açıklaması</label>
                    <textarea id="aciklama" rows="3" placeholder="Arıza detaylarını giriniz..."></textarea>
                </div>

                <div class="form-group">
                    <label for="yapilan-isler">Yapılan İşler *</label>
                    <textarea id="yapilan-isler" rows="3" required placeholder="Yapılan işlemleri giriniz..."></textarea>
                    <small class="error-message" id="yapilan-error"></small>
                </div>

                <button type="submit" class="btn-primary">Kaydet</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
