<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stajyer Paneli - Sesli Kayıt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stajyer.css">
</head>
<body>
    <div class="stajyer-container">
        <header>
            <div class="header-content">
                <div>
                    <h1>Stajyer Paneli</h1>
                    <h2>Sesli Arıza Kayıt Sistemi</h2>
                </div>
                <div class="header-buttons">
                    <a href="index.html" class="btn-secondary">Ana Panel</a>
                    <button id="logout-btn" class="btn-logout">Çıkış</button>
                </div>
            </div>
        </header>

        <div class="voice-panel">
            <div class="voice-card">
                <div class="info-box">
                    <h4>ℹ️ Kullanım Talimatları</h4>
                    <ul>
                        <li>Mikrofon iznini verin</li>
                        <li>İnternet bağlantınızı kontrol edin</li>
                        <li>HTTPS bağlantısı gereklidir</li>
                        <li>Chrome veya Edge kullanın</li>
                    </ul>
                </div>
                <div class="voice-icon" id="voice-icon">🎤</div>
                <h3 id="voice-status">Kayıt Başlatmak İçin Tıklayın</h3>
                <button id="voice-btn" class="btn-voice">Sesli Kayıt Başlat</button>
                <div id="transcript" class="transcript"></div>
            </div>

            <div class="form-card">
                <h3>Otomatik Doldurulan Form</h3>
                <form id="stajyer-form">
                    <div class="form-group">
                        <label>Müdürlük</label>
                        <input type="text" id="ai-birim" readonly>
                    </div>
                    <div class="form-group">
                        <label>Cihaz Türü</label>
                        <input type="text" id="ai-cihaz" readonly>
                    </div>
                    <div class="form-group">
                        <label>Arıza Türü</label>
                        <input type="text" id="ai-ariza-turu" readonly>
                    </div>
                    <div class="form-group">
                        <label>Talep Eden</label>
                        <input type="text" id="ai-talep-eden" readonly>
                    </div>
                    <div class="form-group">
                        <label>Arıza Açıklaması</label>
                        <textarea id="ai-aciklama" rows="3" readonly></textarea>
                    </div>
                    <div class="form-group">
                        <label>Yapılan İşler</label>
                        <textarea id="ai-yapilan" rows="3" readonly></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Kaydet</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/stajyer.js"></script>
</body>
</html>
